<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velox Admin (Production)</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --black:#050507;--white:#F5F4F0;--accent:#C8FF57;
  --gray:#7A7A7A;--gd:#0e0e13;--gm:#1a1a22;
  --border:rgba(255,255,255,0.07);--red:#FF5733;--green:#57FF8A;
  --font:'Merriweather Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:var(--font);}
#adminApp{display:none;}
#adminApp.visible{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
.sidebar{background:var(--gd);border-right:1px solid var(--border);padding:20px;}
.main{padding:24px;}
.btn{background:var(--accent);color:#000;padding:10px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:700;}
input,select{padding:10px;background:#111;border:1px solid var(--border);color:white;border-radius:8px;width:100%;margin-top:6px;}
table{width:100%;margin-top:20px;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left;font-size:13px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;">
  <h2>Velox Admin Login</h2>
  <input id="email" placeholder="email" />
  <input id="pass" type="password" placeholder="password" />
  <button class="btn" onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="adminApp">

  <div class="sidebar">
    <h3>Velox</h3>
    <button class="btn" onclick="loadProducts()">Products</button><br><br>
    <button class="btn" onclick="loadBlogs()">Blogs</button><br><br>
    <button class="btn" onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <h2>Dashboard</h2>

    <div id="formBox">
      <h3>Add Product</h3>
      <input id="p_name" placeholder="Name" />
      <input id="p_price" placeholder="Price" />
      <input id="p_tags" placeholder="Tags" />
      <button class="btn" onclick="addProduct()">Save</button>
    </div>

    <table id="table"></table>
  </div>
</div>

<script>
// SUPABASE INIT
const supabaseUrl = localStorage.getItem('https://pwswjfoivhorcbjmatfq.supabase.co');
const supabaseKey = localStorage.getItem('eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3c3dqZm9pdmhvcmNiam1hdGZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjA0MTQsImV4cCI6MjA5Mjc5NjQxNH0.10EWsGaw4uvnwXxWy9QU4zTqgLLeqtJnD6cVBcbOST4
');
const sb = supabaseUrl ? supabase.createClient(supabaseUrl, supabaseKey) : null;

// AUTH
async function login(){
  const email=document.getElementById('email').value;
  const pass=document.getElementById('pass').value;

  if(!sb){ alert('Supabase not connected'); return; }

  const {data,error} = await sb.auth.signInWithPassword({email,password:pass});
  if(error){ alert(error.message); return; }

  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminApp').classList.add('visible');
  loadProducts();
}

// LOAD PRODUCTS (REAL DB)
async function loadProducts(){
  const {data} = await sb.from('products').select('*');
  let html = `<tr><th>Name</th><th>Price</th><th>Tags</th><th>Action</th></tr>`;

  data.forEach(p=>{
    html += `<tr>
      <td>${p.name}</td>
      <td>${p.price}</td>
      <td>${p.tags}</td>
      <td><button onclick="deleteProduct('${p.id}')">Delete</button></td>
    </tr>`;
  });

  document.getElementById('table').innerHTML = html;
}

// ADD PRODUCT
async function addProduct(){
  const name=document.getElementById('p_name').value;
  const price=document.getElementById('p_price').value;
  const tags=document.getElementById('p_tags').value;

  await sb.from('products').insert([{name,price,tags}]);
  loadProducts();
}

// DELETE
async function deleteProduct(id){
  await sb.from('products').delete().eq('id',id);
  loadProducts();
}

// BLOGS
async function loadBlogs(){
  const {data} = await sb.from('blogs').select('*');
  console.log(data);
}

// LOGOUT
async function logout(){
  await sb.auth.signOut();
  location.reload();
}
</script>

</body>
</html>
